<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 99 210" width="99mm" height="210mm">
  <!-- CMYK-safe colors: Red #C41E3A (0/85/70/23), Black #1A1A1A (0/0/0/90), White #FFFFFF -->

  <!-- === TOP SECTION: Dark header === -->
  <rect x="0" y="0" width="99" height="70" fill="#1A1A1A"/>

  <!-- Logo hexagon -->
  <g transform="translate(49.5, 22) scale(0.36)">
    <polygon points="25,2 48,15 48,35 25,48 2,35 2,15" fill="none" stroke="#C41E3A" stroke-width="2" transform="translate(-25,-25)"/>
    <polygon points="25,10 40,19 40,31 25,40 10,31 10,19" fill="#C41E3A" opacity="0.12" transform="translate(-25,-25)"/>
    <text x="0" y="5" text-anchor="middle" fill="#C41E3A" font-family="Playfair Display, serif" font-size="14" font-weight="700">R</text>
  </g>

  <!-- Brand name -->
  <text x="49.5" y="40" text-anchor="middle" font-family="Playfair Display, serif" font-size="8" font-weight="700" fill="#FFFFFF" letter-spacing="0.02em">REDLINE</text>

  <!-- Tagline -->
  <text x="49.5" y="47" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="2.2" fill="#C41E3A" letter-spacing="0.25em">PRECISION AI ENGINEERING</text>

  <!-- Divider -->
  <line x1="35" y1="53" x2="64" y2="53" stroke="#C41E3A" stroke-width="0.4" opacity="0.6"/>
  <circle cx="49.5" cy="53" r="0.8" fill="#C41E3A"/>

  <!-- Subtitle -->
  <text x="49.5" y="62" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.5" fill="#E8E8E8" font-weight="300">Websites, die wirken.</text>
  <text x="49.5" y="66" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.5" fill="#E8E8E8" font-weight="300">Gebaut mit KI. Gesteuert von Menschen.</text>

  <!-- === MIDDLE SECTION: White === -->
  <rect x="0" y="70" width="99" height="85" fill="#FFFFFF"/>

  <!-- Headline -->
  <text x="49.5" y="86" text-anchor="middle" font-family="Playfair Display, serif" font-size="5" font-weight="700" fill="#1A1A1A">Wir reden nicht.</text>
  <text x="49.5" y="93" text-anchor="middle" font-family="Playfair Display, serif" font-size="5" font-weight="700" fill="#C41E3A">Wir bauen.</text>

  <!-- Value prop 1 -->
  <rect x="10" y="102" width="2" height="14" fill="#C41E3A" rx="0.5"/>
  <text x="16" y="108" font-family="Inter, sans-serif" font-size="2.8" font-weight="600" fill="#1A1A1A">Arbeitsprobe statt Konzept</text>
  <text x="16" y="113" font-family="Inter, sans-serif" font-size="2.2" fill="#4A4A4A">Wir bauen deine Website um, bevor du</text>
  <text x="16" y="116.5" font-family="Inter, sans-serif" font-size="2.2" fill="#4A4A4A">dich entscheidest. Kein Risiko.</text>

  <!-- Value prop 2 -->
  <rect x="10" y="122" width="2" height="14" fill="#C41E3A" rx="0.5"/>
  <text x="16" y="128" font-family="Inter, sans-serif" font-size="2.8" font-weight="600" fill="#1A1A1A">Mensch + KI = Präzision</text>
  <text x="16" y="133" font-family="Inter, sans-serif" font-size="2.2" fill="#4A4A4A">KI liefert Geschwindigkeit. Wir liefern</text>
  <text x="16" y="136.5" font-family="Inter, sans-serif" font-size="2.2" fill="#4A4A4A">die Richtung. Ohne uns: nur Durchschnitt.</text>

  <!-- Value prop 3 -->
  <rect x="10" y="142" width="2" height="14" fill="#C41E3A" rx="0.5"/>
  <text x="16" y="148" font-family="Inter, sans-serif" font-size="2.8" font-weight="600" fill="#1A1A1A">Dein Code. Dein Eigentum.</text>
  <text x="16" y="153" font-family="Inter, sans-serif" font-size="2.2" fill="#4A4A4A">Kein Template. Individuell gebaut.</text>
  <text x="16" y="156.5" font-family="Inter, sans-serif" font-size="2.2" fill="#4A4A4A">Kompletter Source Code gehört dir.</text>

  <!-- === BOTTOM SECTION: Light gray === -->
  <rect x="0" y="155" width="99" height="55" fill="#F5F5F5"/>
  <line x1="0" y1="155" x2="99" y2="155" stroke="#E8E8E8" stroke-width="0.3"/>

  <!-- CTA -->
  <text x="49.5" y="171" text-anchor="middle" font-family="Inter, sans-serif" font-size="3" font-weight="600" fill="#1A1A1A">Kostenloser Umbau</text>
  <text x="49.5" y="176" text-anchor="middle" font-family="Inter, sans-serif" font-size="3" font-weight="600" fill="#1A1A1A">deiner Website</text>

  <!-- URL -->
  <rect x="30" y="182" width="39" height="8" rx="1" fill="#C41E3A"/>
  <text x="49.5" y="187.5" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="3" font-weight="600" fill="#FFFFFF" letter-spacing="0.05em">redline.dev</text>

  <!-- Contact -->
  <text x="49.5" y="198" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="1.8" fill="#666666" letter-spacing="0.03em">hallo@redline.dev</text>

  <!-- Bottom red line -->
  <rect x="0" y="209" width="99" height="1" fill="#C41E3A"/>
</svg>
